<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банковский сервис - Вход</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🏦 Банковский сервис</h1>
            
            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <div id="login-tab" class="tab-content active">
                <form id="login-form">
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="login-email" required placeholder="example@mail.ru">
                    </div>
                    <div class="form-group">
                        <label>Пароль:</label>
                        <input type="password" id="login-password" required placeholder="минимум 6 символов">
                    </div>
                    <button type="submit" class="btn-primary">Войти</button>
                </form>
            </div>
            
            <!-- Форма регистрации -->
            <div id="register-tab" class="tab-content">
                <form id="register-form">
                    <div class="form-group">
                        <label>Имя пользователя:</label>
                        <input type="text" id="reg-username" required placeholder="ivan_ivanov">
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="reg-email" required placeholder="ivan@mail.ru">
                    </div>
                    <div class="form-group">
                        <label>Пароль:</label>
                        <input type="password" id="reg-password" required placeholder="минимум 6 символов">
                    </div>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </form>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
